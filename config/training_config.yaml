model:
  base_model_id: "HuggingFaceTB/SmolLM2-135M"
  torch_dtype: "float32"
  attn_implementation: "eager"
  use_cache: false

qlora:
  enabled: false

lora:
  enabled: true
  r: 16
  lora_alpha: 32
  lora_dropout: 0.1
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  output_dir: "./outputs/smollm2-135m-cpp-lua"
  num_train_epochs: 1
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 4
  gradient_checkpointing: false
  learning_rate: 3.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 1.0
  logging_steps: 5
  save_steps: 50
  eval_steps: 50
  save_total_limit: 2
  load_best_model_at_end: false
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  bf16: false
  tf32: false
  fp16: false
  dataloader_num_workers: 0
  packing: true
  max_seq_length: 512
  remove_unused_columns: false
  report_to: "none"
  run_name: "SmolLM2-135M-cpp-lua-cpu"
