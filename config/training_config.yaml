model:
  base_model_id: "HuggingFaceTB/SmolLM2-360M"
  torch_dtype: "bfloat16"
  attn_implementation: "eager"
  use_cache: false

qlora:
  quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true
  load_in_4bit: true

lora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.1
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  output_dir: "./outputs/smollm2-360m-cpp-lua"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  gradient_checkpointing: true
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 0.3
  logging_steps: 25
  save_steps: 200
  eval_steps: 200
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  bf16: true
  tf32: true
  dataloader_num_workers: 4
  packing: true
  max_seq_length: 2048
  remove_unused_columns: false
  report_to: "wandb"
  run_name: "SmolLM2-360M-cpp-lua-codegen"
