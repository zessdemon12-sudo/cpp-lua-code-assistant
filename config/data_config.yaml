datasets:
  the_stack_v2:
    enabled: true
    split: "train"
    languages:
      - "C++"
      - "Lua"
    max_samples_per_language: 500
    deduplicate: false
    min_size_bytes: 100
    max_size_bytes: 10000

  code_alpaca:
    enabled: false

  self_instruct:
    enabled: true
    max_instruction_pairs: 1000
    synthesis_ratio: 1.0
    templates:
      - "Write a {language} function that {task}"
      - "Implement a {language} class for {task}"
      - "Create a {language} program that {task}"

output:
  train_file: "./data/processed/train_dataset.parquet"
  eval_file: "./data/processed/eval_dataset.parquet"
  eval_split_ratio: 0.05
  cache_dir: "./data/cache"

preprocessing:
  max_length: 512
  truncation: true
  instruction_format: >-
    ### Instruction
    {instruction}

    ### Response
    ```{language}
    {code}
    ```
